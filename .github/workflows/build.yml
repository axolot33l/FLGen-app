name: Build & Release APKs

on:
  push:
    tags:
      - "v*"  # Only runs on tags like v1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug + Release APKs
        run: ./gradlew assembleDebug assembleRelease --parallel --build-cache --daemon

      - name: Collect APKs
        run: |
          mkdir release
          cp app/build/outputs/apk/debug/*.apk release/app-debug.apk || true
          cp app/build/outputs/apk/release/*.apk release/app-release.apk || true

      - name: Set Tag Name
        id: tag
        run: |
          if [[ "${GITHUB_REF_NAME}" != "" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: release/*.apk
          body: |
            # Download

            | Type    | Download |
            |---------|----------|
            | Release | [Download](../../releases/download/${{ steps.tag.outputs.tag }}/app-release.apk) |
            | Debug   | [Download](../../releases/download/${{ steps.tag.outputs.tag }}/app-debug.apk) |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
