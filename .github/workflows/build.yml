name: Build & Sign APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;33.0.2"

      - name: Create Git Tag Automatically
        id: git_tag
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          # Increment patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG//v/}"
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --parallel --build-cache --daemon

      - name: Prepare release folder
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/
          cp app/build/outputs/apk/release/app-release.apk release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          tag_name: ${{ steps.git_tag.outputs.new_tag }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
